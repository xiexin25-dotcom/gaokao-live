<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>中国职业 AI 影响度全景图</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',system-ui,sans-serif;background:#080F1A;color:#D0D8E8;overflow-x:hidden}

/* ── 顶栏 ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-left a{color:rgba(255,255,255,.4);font-size:20px;text-decoration:none}
.tb-title{font-size:16px;font-weight:800;color:#fff}
.tb-sub{font-size:11px;color:rgba(255,255,255,.35)}

/* ── 控制面板 ── */
.ctrl-bar{display:flex;flex-wrap:wrap;gap:8px;padding:14px 24px;background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.05)}
.ctrl-group{display:flex;align-items:center;gap:6px}
.ctrl-label{font-size:11px;color:rgba(255,255,255,.4);white-space:nowrap}
.ctrl-btn{font-size:11px;font-weight:700;padding:5px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:rgba(255,255,255,.55);cursor:pointer;transition:.15s;white-space:nowrap}
.ctrl-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.ctrl-btn.active{background:rgba(74,158,255,.15);color:#4A9EFF;border-color:rgba(74,158,255,.3)}

/* ── 图例 ── */
.legend-bar{display:flex;align-items:center;gap:16px;padding:10px 24px;background:rgba(255,255,255,.015)}
.legend-gradient{display:flex;align-items:center;gap:8px;flex:1}
.legend-gradient .bar{height:10px;flex:1;border-radius:5px;max-width:280px}
.legend-label{font-size:10px;color:rgba(255,255,255,.35)}
.legend-info{font-size:10px;color:rgba(255,255,255,.3)}

/* ── 统计卡片 ── */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:14px 24px}
.stat-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:12px;text-align:center}
.stat-val{font-size:22px;font-weight:900;color:#fff}
.stat-lbl{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px}

/* ── 树图容器 ── */
.treemap-wrap{padding:8px 24px 24px;position:relative}
#treemap{width:100%;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
.cell{position:absolute;overflow:hidden;cursor:pointer;transition:opacity .15s}
.cell:hover{opacity:.85;z-index:10}
.cell-inner{width:100%;height:100%;padding:4px 6px;display:flex;flex-direction:column;justify-content:center;border:1px solid rgba(0,0,0,.3);position:relative}
.cell-name{font-size:11px;font-weight:700;color:#fff;line-height:1.2;text-shadow:0 1px 3px rgba(0,0,0,.6);overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2}
.cell-meta{font-size:9px;color:rgba(255,255,255,.7);margin-top:2px;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.cell-cat{position:absolute;top:3px;right:5px;font-size:8px;font-weight:800;color:rgba(255,255,255,.45);text-shadow:0 1px 2px rgba(0,0,0,.5)}

/* ── 详情浮窗 ── */
.tooltip{position:fixed;z-index:200;background:rgba(12,18,32,.96);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:16px;max-width:340px;pointer-events:none;opacity:0;transition:opacity .12s;backdrop-filter:blur(16px);box-shadow:0 8px 32px rgba(0,0,0,.5)}
.tooltip.show{opacity:1}
.tt-title{font-size:15px;font-weight:800;color:#fff;margin-bottom:8px}
.tt-cat{font-size:11px;color:rgba(255,255,255,.4);margin-bottom:10px}
.tt-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.tt-item{background:rgba(255,255,255,.04);border-radius:8px;padding:8px}
.tt-item-val{font-size:16px;font-weight:800;color:#fff}
.tt-item-lbl{font-size:9px;color:rgba(255,255,255,.35);margin-top:1px}
.tt-ai-bar{margin-top:10px;background:rgba(255,255,255,.06);border-radius:8px;padding:10px}
.tt-ai-title{font-size:10px;font-weight:700;color:rgba(255,255,255,.5);margin-bottom:6px}
.tt-ai-track{height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.tt-ai-fill{height:100%;border-radius:4px;transition:width .3s}
.tt-ai-score{font-size:20px;font-weight:900;margin-top:6px}
.tt-desc{font-size:11px;color:rgba(255,255,255,.45);margin-top:8px;line-height:1.5;border-top:1px solid rgba(255,255,255,.06);padding-top:8px}
.tt-majors{margin-top:8px;border-top:1px solid rgba(255,255,255,.06);padding-top:8px}
.tt-majors-title{font-size:10px;font-weight:700;color:rgba(255,255,255,.4);margin-bottom:4px}
.tt-major-tag{display:inline-block;font-size:9px;font-weight:600;padding:2px 7px;border-radius:4px;background:rgba(74,158,255,.1);color:#4A9EFF;margin:2px 3px 2px 0}

/* ── 底部说明 ── */
.footer{padding:20px 24px;text-align:center}
.footer p{font-size:11px;color:rgba(255,255,255,.2);line-height:1.8}
.footer a{color:rgba(74,158,255,.6);text-decoration:none}

/* ── 响应式 ── */
@media(max-width:767px){
  .topbar{padding:12px 14px}
  .ctrl-bar{padding:10px 14px}
  .stats-row{grid-template-columns:repeat(3,1fr);padding:10px 14px}
  .treemap-wrap{padding:6px 14px 16px}
  .legend-bar{padding:8px 14px;gap:10px}
  .cell-name{font-size:9px}
  .cell-meta{font-size:8px}
}
@media(max-width:480px){
  .stats-row{grid-template-columns:repeat(2,1fr);gap:6px}
  .stat-val{font-size:17px}
  .ctrl-btn{font-size:10px;padding:4px 9px}
  .tb-title{font-size:14px}
}
</style>
</head>

<div class="topbar">
  <div class="tb-left">
    <a href="{{ API_BASE }}/" title="返回首页">←</a>
    <div>
      <div class="tb-title">中国职业 AI 影响度全景图</div>
      <div class="tb-sub">方块面积 = 就业人数 · 颜色 = AI 暴露度 · 数据来源: 人社部/BLS/学术研究</div>

  </div>

    <button class="ctrl-btn" data-color="growth">增长预测</button>

</div>

<div class="legend-bar" id="legendBar">
  <span class="legend-label" id="legendLo">低风险 0</span>

  <span class="legend-label" id="legendHi">高风险 10</span>
  <span class="legend-info" id="legendInfo">点击方块查看详情</span>
</div>

<div class="stats-row" id="statsRow"></div>

<div class="treemap-wrap">
  <div id="treemap"></div>
</div>

<div class="tooltip" id="tooltip"></div>

<div class="footer">
  <p>数据说明：AI 暴露度评分 (0-10) 综合参考 Karpathy/Jobs、Eloundou et al. (2023)、OECD AI Exposure Index 等研究<br>

</div>

// ══════════════════════════════════════════════════════════
//  全局状态
// ══════════════════════════════════════════════════════════
let sizeMode  = 'employment'; // employment | salary
let colorMode = 'ai';         // ai | salary | growth | education
const EDU_LABELS = {1:'初中及以下', 2:'高中/中专', 3:'大专', 4:'本科', 5:'硕士及以上'};

// ── 颜色比例尺 ──
function getColorScale() {
  if (colorMode === 'ai')
    return d3.scaleSequential(d3.interpolateRdYlGn).domain([10, 0]);
  if (colorMode === 'salary')
    return d3.scaleSequential(d3.interpolateYlOrRd).domain([5, 80]);
  if (colorMode === 'growth')
    return d3.scaleSequential(d3.interpolateRdYlGn).domain([-20, 28]);
  // education
  return d3.scaleSequential(d3.interpolatePurples).domain([1, 5]);
}

function getCellColor(d) {
  const cs = getColorScale();
  if (colorMode === 'ai')        return cs(d.ai);
  if (colorMode === 'salary')    return cs(d.salary);
  if (colorMode === 'growth')    return cs(d.growth);
  return cs(d.edu);
}

// ── 统计 ──
function renderStats() {
  const totalEmp = DATA.reduce((s,d) => s + d.emp, 0);
  const avgAI    = (DATA.reduce((s,d) => s + d.ai * d.emp, 0) / totalEmp).toFixed(1);
  const avgSal   = (DATA.reduce((s,d) => s + d.salary * d.emp, 0) / totalEmp).toFixed(1);
  const highRisk = DATA.filter(d => d.ai >= 7).length;
  const lowRisk  = DATA.filter(d => d.ai <= 3).length;
  const cats     = new Set(DATA.map(d => d.cat)).size;

  document.getElementById('statsRow').innerHTML = [
    {v: DATA.length, l: '职业数'},
    {v: cats, l: '行业分类'},
    {v: avgAI, l: '加权平均 AI 暴露度'},
    {v: `${highRisk}`, l: '高风险职业 (≥7)'},
    {v: `${lowRisk}`, l: '低风险职业 (≤3)'},
  ].map(s => `<div class="stat-card"><div class="stat-val">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`).join('');
}

// ── 图例 ──
function renderLegend() {
  const bar = document.getElementById('legendGradient');
  const lo  = document.getElementById('legendLo');
  const hi  = document.getElementById('legendHi');
  if (colorMode === 'ai') {
    bar.style.background = 'linear-gradient(90deg, #2ca02c, #d4d400, #d62728)';
    lo.textContent = '低风险 0'; hi.textContent = '高风险 10';
  } else if (colorMode === 'salary') {
    bar.style.background = 'linear-gradient(90deg, #ffffb2, #fd8d3c, #bd0026)';
    lo.textContent = '5万/年'; hi.textContent = '80万/年';
  } else if (colorMode === 'growth') {
    bar.style.background = 'linear-gradient(90deg, #d62728, #d4d400, #2ca02c)';
    lo.textContent = '萎缩 -20%'; hi.textContent = '增长 +28%';
  } else {
    bar.style.background = 'linear-gradient(90deg, #f2f0f7, #9e9ac8, #54278f)';
    lo.textContent = '初中'; hi.textContent = '硕士+';
  }
}

// ── 树图渲染 ──
function renderTreemap() {
  const container = document.getElementById('treemap');
  const W = container.clientWidth;
  const H = Math.max(500, Math.min(W * 0.75, 700));
  container.style.height = H + 'px';
  container.innerHTML = '';

  // Build hierarchy: root → category → jobs
  const nested = d3.group(DATA, d => d.cat);
  const rootData = {
    name: 'root',
    children: Array.from(nested, ([cat, jobs]) => ({
      name: cat,
      children: jobs.map(j => ({...j, value: sizeMode === 'employment' ? j.emp : j.salary}))
    }))
  };

  const root = d3.hierarchy(rootData)
    .sum(d => d.value || 0)
    .sort((a, b) => b.value - a.value);

  d3.treemap()
    .size([W, H])
    .padding(2)
    .paddingTop(16)
    .round(true)(root);

  // Category labels
  root.children.forEach(cat => {
    const label = document.createElement('div');
    label.style.cssText = `position:absolute;left:${cat.x0}px;top:${cat.y0}px;width:${cat.x1-cat.x0}px;
      font-size:9px;font-weight:800;color:rgba(255,255,255,.3);padding:1px 4px;overflow:hidden;
      white-space:nowrap;text-overflow:ellipsis;pointer-events:none;z-index:5`;
    label.textContent = cat.data.name;
    container.appendChild(label);
  });

  // Cells
  const leaves = root.leaves();
  leaves.forEach(leaf => {
    const d = leaf.data;
    const w = leaf.x1 - leaf.x0;
    const h = leaf.y1 - leaf.y0;
    if (w < 2 || h < 2) return;

    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.style.cssText = `left:${leaf.x0}px;top:${leaf.y0}px;width:${w}px;height:${h}px`;

    const bg = getCellColor(d);
    const showName = w > 35 && h > 22;
    const showMeta = w > 50 && h > 36;

    cell.innerHTML = `<div class="cell-inner" style="background:${bg}">
      ${showName ? `<div class="cell-name">${d.name}</div>` : ''}
      ${showMeta ? `<div class="cell-meta">${sizeMode==='employment' ? d.emp+'万人' : d.salary+'万/年'}</div>` : ''}
    </div>`;

    cell.addEventListener('mouseenter', e => showTooltip(e, d));
    cell.addEventListener('mousemove', e => moveTooltip(e));
    cell.addEventListener('mouseleave', hideTooltip);
    cell.addEventListener('click', e => showTooltip(e, d));
    container.appendChild(cell);
  });
}

// ── Tooltip ──
function showTooltip(e, d) {
  const tt = document.getElementById('tooltip');
  const aiPct = (d.ai / 10 * 100).toFixed(0);
  const aiColor = d.ai >= 7 ? '#FF453A' : d.ai >= 4 ? '#FF9F0A' : '#34C759';
  const growthColor = d.growth > 0 ? '#34C759' : d.growth < -5 ? '#FF453A' : '#FF9F0A';
  const majorsHtml = d.majors.length
    ? d.majors.map(m => `<span class="tt-major-tag">${m}</span>`).join('')
    : '<span style="font-size:10px;color:rgba(255,255,255,.25)">无特定专业要求</span>';

  tt.innerHTML = `
    <div class="tt-title">${d.name}</div>
    <div class="tt-cat">${d.cat}</div>
    <div class="tt-grid">
      <div class="tt-item"><div class="tt-item-val">${d.emp}<span style="font-size:11px">万</span></div><div class="tt-item-lbl">就业人数</div></div>
      <div class="tt-item"><div class="tt-item-val">${d.salary}<span style="font-size:11px">万/年</span></div><div class="tt-item-lbl">中位薪资</div></div>
      <div class="tt-item"><div class="tt-item-val" style="color:${growthColor}">${d.growth > 0 ? '+' : ''}${d.growth}%</div><div class="tt-item-lbl">增长预测</div></div>
      <div class="tt-item"><div class="tt-item-val">${EDU_LABELS[d.edu]}</div><div class="tt-item-lbl">学历要求</div></div>
    </div>
    <div class="tt-ai-bar">
      <div class="tt-ai-title">AI 暴露度评分</div>
      <div class="tt-ai-track"><div class="tt-ai-fill" style="width:${aiPct}%;background:${aiColor}"></div></div>
      <div class="tt-ai-score" style="color:${aiColor}">${d.ai} <span style="font-size:11px;color:rgba(255,255,255,.3)">/ 10</span></div>
    </div>
    <div class="tt-desc">${d.desc}</div>
    <div class="tt-majors">
      <div class="tt-majors-title">对口高考专业</div>
      ${majorsHtml}
    </div>
  `;
  tt.classList.add('show');
  moveTooltip(e);
}

function moveTooltip(e) {
  const tt = document.getElementById('tooltip');
  const pad = 16;
  let x = e.clientX + pad;
  let y = e.clientY + pad;
  const r = tt.getBoundingClientRect();
  if (x + r.width > window.innerWidth) x = e.clientX - r.width - pad;
  if (y + r.height > window.innerHeight) y = e.clientY - r.height - pad;
  tt.style.left = Math.max(4, x) + 'px';
  tt.style.top  = Math.max(4, y) + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('show');
}

// ── 控制按钮 ──
document.querySelectorAll('.ctrl-btn[data-size]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ctrl-btn[data-size]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    sizeMode = btn.dataset.size;
    renderTreemap();
  });
});
document.querySelectorAll('.ctrl-btn[data-color]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ctrl-btn[data-color]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    colorMode = btn.dataset.color;
    renderLegend();
    renderTreemap();
  });
});

// ── 初始化 ──
renderStats();
renderLegend();
// 等待布局完成后再渲染树图（确保容器 clientWidth > 0）
requestAnimationFrame(() => {
  renderTreemap();
});
window.addEventListener('resize', renderTreemap);
