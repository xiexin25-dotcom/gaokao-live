<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>院校分布地图 · 志愿规划</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC',system-ui,sans-serif;background:#FFFFFF;color:#1D1D1F;overflow:hidden;height:100vh;max-width:480px;margin:0 auto;box-shadow:0 0 40px rgba(0,0,0,.08)}

/* ── 顶栏 ── */
.topbar{background:#F5F5F7;border-bottom:1px solid rgba(0,0,0,.06);padding:0 14px;height:48px;display:flex;align-items:center;gap:10px;position:fixed;top:0;left:0;right:0;z-index:200;max-width:480px;margin:0 auto}
a.back{color:rgba(0,0,0,.4);font-size:28px;text-decoration:none;line-height:1;padding:4px}
.tb-title{font-size:18px;font-weight:800;color:#1D1D1F;flex:1}
.ke-toggle{display:flex;background:rgba(0,0,0,.07);border-radius:8px;overflow:hidden;border:1px solid rgba(0,0,0,.08)}
.ke-tab{padding:5px 13px;font-size:15px;font-weight:700;cursor:pointer;color:rgba(0,0,0,.4);border:none;background:none;transition:.15s;font-family:inherit}
.ke-tab.on{background:#007AFF;color:#fff}
.stat-chip{font-size:14px;font-weight:700;padding:4px 10px;border-radius:8px;background:rgba(0,0,0,.06);color:rgba(0,0,0,.45);white-space:nowrap}

/* ── 地图主体 ── */
#mapChart{position:fixed;top:48px;left:0;right:0;bottom:0;max-width:480px;margin:0 auto}

/* ── 加载遮罩 ── */
#loadOverlay{position:fixed;inset:0;background:#FFFFFF;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;max-width:480px;margin:0 auto}
.spin{width:32px;height:32px;border:3px solid rgba(0,122,255,.2);border-top-color:#007AFF;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-size:17px;color:rgba(0,0,0,.4)}

/* ── 侧边面板 ── */
#panel{position:fixed;top:48px;right:-360px;width:340px;bottom:0;background:#FFFFFF;border-left:1px solid rgba(0,0,0,.08);z-index:150;transition:right .28s cubic-bezier(.4,0,.2,1);overflow-y:auto;display:flex;flex-direction:column;box-shadow:-2px 0 20px rgba(0,0,0,.06)}
#panel.open{right:0}
.ph{padding:14px 16px;border-bottom:1px solid rgba(0,0,0,.07);display:flex;align-items:flex-start;gap:8px;flex-shrink:0}
.ph-city{font-size:22px;font-weight:900;color:#1D1D1F}
.ph-prov{font-size:14px;color:rgba(0,0,0,.4);margin-top:2px}
.ph-close{margin-left:auto;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;color:rgba(0,0,0,.4);background:rgba(0,0,0,.06);border:none;flex-shrink:0;transition:.15s}
.ph-close:hover{background:rgba(0,0,0,.12);color:#1D1D1F}
.ps{padding:10px 16px;display:flex;gap:14px;background:rgba(0,0,0,.03);border-bottom:1px solid rgba(0,0,0,.05);flex-shrink:0}
.ps-item{text-align:center}
.ps-num{font-size:22px;font-weight:900}
.ps-lbl{font-size:13px;color:rgba(0,0,0,.35);margin-top:2px;letter-spacing:.5px}
.panel-body{flex:1;overflow-y:auto}
.lv-sec{padding:8px 0}
.lv-hd{display:flex;align-items:center;gap:7px;padding:6px 16px}
.lv-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.lv-name{font-size:14px;font-weight:800;letter-spacing:1px}
.lv-cnt{font-size:14px;color:rgba(0,0,0,.3);margin-left:auto}
.sch-item{padding:7px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(0,0,0,.04);cursor:default}
.sch-item:last-child{border:none}
.sch-item.plan-hi{background:rgba(0,122,255,.06)}
.sch-name{font-size:15px;font-weight:600;flex:1;line-height:1.35}
.sch-score{font-size:15px;font-weight:700;color:#FFD60A;flex-shrink:0}
.tp-tag{font-size:13px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0}
.tp-rush{background:rgba(255,149,0,.15);color:#FF9500}
.tp-steady{background:rgba(52,199,89,.15);color:#34C759}
.tp-safe{background:rgba(0,122,255,.15);color:#007AFF}
.no-data{padding:24px 16px;text-align:center;font-size:15px;color:rgba(0,0,0,.25)}

/* ── 图例 ── */
.legend{position:fixed;bottom:20px;left:16px;background:rgba(255,255,255,.96);border:1px solid rgba(0,0,0,.09);border-radius:12px;padding:12px 14px;z-index:140;backdrop-filter:blur(10px);box-shadow:0 2px 12px rgba(0,0,0,.06)}
.leg-title{font-size:13px;font-weight:800;letter-spacing:2px;color:rgba(0,0,0,.3);margin-bottom:8px}
.leg-item{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:15px;color:rgba(0,0,0,.6)}
.leg-item:last-child{margin-bottom:0}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.leg-ring{width:10px;height:10px;border-radius:50%;border:2px solid #007AFF;flex-shrink:0}
.leg-sep{border-top:1px solid rgba(0,0,0,.08);margin:6px 0}

/* ── 提示条 ── */
.tip-bar{position:fixed;top:58px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.92);border:1px solid rgba(0,122,255,.25);border-radius:20px;padding:5px 14px;font-size:15px;color:#007AFF;z-index:160;pointer-events:none;backdrop-filter:blur(8px);transition:opacity .5s;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.06)}

/* ── 误差提示 ── */
.offline-warn{position:fixed;bottom:20px;right:16px;background:rgba(255,149,0,.1);border:1px solid rgba(255,149,0,.3);border-radius:10px;padding:8px 12px;font-size:15px;color:#FF9500;z-index:140;max-width:220px;display:none}
</style>
</head>

<div id="loadOverlay">
  <div class="spin"></div>
  <div class="load-txt">正在加载地图数据…</div>
</div>

<div class="topbar">
  <a class="back" href="{{ API_BASE }}/" title="返回首页">&#8592;</a>
  <div class="tb-title">院校分布地图</div>
  <span class="stat-chip" id="totalChip">加载中…</span>

</div>

<div id="mapChart"></div>

<!-- 侧边面板 -->
<div id="panel">

</div>

<!-- 图例 -->
<div class="legend">

<div class="tip-bar" id="tipBar">点击圆点查看院校详情 &nbsp;· 滚轮缩放地图</div>
<div class="offline-warn" id="offlineWarn">底图加载失败（离线模式）<br>院校数据点仍可正常显示</div>

  chart = echarts.init(document.getElementById('mapChart'));
  window.addEventListener('resize', () => chart && chart.resize());

  // 加载中国地图 GeoJSON
  try {
    const geoResp = await fetch(API_BASE + '/static/china_geo.json');
    const geoJson = await geoResp.json();
    echarts.registerMap('china', geoJson);
    geoLoaded = true;
  } catch(e) {
    console.warn('地图底图加载失败（可能处于离线状态）:', e);
    document.getElementById('offlineWarn').style.display = 'block';
  }

  await loadData('物理');

  document.getElementById('loadOverlay').style.display = 'none';

  // 3秒后淡出提示条
  setTimeout(() => {
    const tip = document.getElementById('tipBar');
    tip.style.opacity = '0';
    tip.style.pointerEvents = 'none';
  }, 3500);
}

// ── 切换科类 ──────────────────────────────────────────────
function switchKe(ke) {
  if (ke === currentKe) return;
  currentKe = ke;
  document.getElementById('kePhys').classList.toggle('on', ke === '物理');
  document.getElementById('keHist').classList.toggle('on', ke === '历史');
  closePanel();
  loadData(ke);
}

// ── 拉取数据 ──────────────────────────────────────────────
async function loadData(ke) {
  try {
    const r = await fetch(API_BASE + '/api/map_data?ke=' + encodeURIComponent(ke));
    mapData = await r.json();
    if (!mapData.ok) throw new Error(mapData.error || '未知错误');
    document.getElementById('totalChip').textContent =
      `共 ${mapData.total_schools} 所院校 · ${mapData.cities.length} 个城市`;
    renderMap();
  } catch(e) {
    document.getElementById('totalChip').textContent = '数据加载失败';
    console.error(e);
  }
}

// ── 渲染地图 ──────────────────────────────────────────────
function renderMap() {
  if (!mapData || !chart) return;

  // 普通城市散点
  const scatterData = [];
  for (const c of mapData.cities) {
    const coord = CC[c.city];
    if (!coord) continue;
    scatterData.push({
      name: c.city,
      value: [coord[0], coord[1], c.count],
      cityData: c,
      itemStyle: { color: LV_COLOR[c.top_lv] || '#636366', opacity: 0.82 },
    });
  }

  // 已选志愿城市（effectScatter）
  const planData = [];
  if (mapData.has_plan && mapData.plan_cities) {
    for (const [city, schools] of Object.entries(mapData.plan_cities)) {
      const coord = CC[city];
      if (!coord) continue;
      planData.push({ name: city, value: [coord[0], coord[1]], planSchools: schools });
    }
  }

  const geoSeries = geoLoaded ? [{
    type: 'map',
    map: 'china',
    roam: false,
    silent: true,
    label: { show: false },
    itemStyle: { areaColor: '#E8E8ED', borderColor: '#C7C7CC', borderWidth: 0.8 },
    emphasis: { disabled: true },
    select: { disabled: true },
    data: [],
  }] : [];

  const option = {
    backgroundColor: '#FFFFFF',
    tooltip: {
      trigger: 'item',
      backgroundColor: 'rgba(255,255,255,.96)',
      borderColor: 'rgba(0,0,0,.1)',
      textStyle: { color: '#1D1D1F', fontSize: 15 },
      padding: [8, 12],
      extraCssText: 'box-shadow:0 4px 16px rgba(0,0,0,.1);',
      formatter(params) {
        const d = params.data;
        if (!d) return '';
        if (d.cityData) {
          const c = d.cityData;
          const lvLine = LV_NAME[c.top_lv] ? `最高层次: <b style="color:${LV_COLOR[c.top_lv]}">${LV_NAME[c.top_lv]}</b>` : '';
          return `<b>${d.name}</b> · ${c.province}<br>${lvLine}<br>院校数: <b>${c.count}</b> 所`;
        }
        if (d.planSchools) {
          const lines = d.planSchools.map(s =>
            `<span style="color:${LV_COLOR[s.lv]||'#aaa'}">${s.school}</span> [${s.tp}]`
          ).join('<br>');
          return `<b>${d.name}</b> · 已选 ${d.planSchools.length} 所<br>${lines}`;
        }
        return d.name;
      }
    },
    geo: {
      map: geoLoaded ? 'china' : undefined,
      roam: true,
      zoom: 1.18,
      center: [105, 36],
      label: { show: false },
      itemStyle: {
        areaColor: '#E8E8ED',
        borderColor: '#C7C7CC',
        borderWidth: 0.8,
        shadowColor: 'rgba(0,0,0,.08)',
        shadowBlur: 10,
      },
      emphasis: {
        label: { show: false },
        itemStyle: { areaColor: '#D1D1D6' },
      },
    },
    series: [
      ...geoSeries,
      {
        name: '院校城市',
        type: 'scatter',
        coordinateSystem: 'geo',
        data: scatterData,
        symbolSize(val) {
          const n = val[2];
          return Math.min(Math.max(Math.sqrt(n) * 5 + 3, 5), 48);
        },
        emphasis: {
          scale: 1.5,
          itemStyle: { borderColor: '#1D1D1F', borderWidth: 2, opacity: 1 },
        },
        zlevel: 10,
      },
      ...(planData.length ? [{
        name: '已选志愿',
        type: 'effectScatter',
        coordinateSystem: 'geo',
        data: planData,
        symbolSize: 13,
        rippleEffect: { brushType: 'stroke', scale: 3.5, period: 2.8, color: '#007AFF' },
        itemStyle: { color: '#007AFF', opacity: 0.92 },
        label: {
          show: true, position: 'right',
          formatter: '{b}',
          color: '#007AFF', fontSize: 14, fontWeight: 700,
        },
        zlevel: 20,
      }] : []),
    ],
  };

  chart.setOption(option, true);

  chart.off('click');
  chart.on('click', params => {
    const d = params.data;
    if (!d) return;
    if (d.cityData) {
      showPanel(d.cityData);
    } else if (d.planSchools) {
      const cd = mapData.cities.find(c => c.city === d.name);
      showPanel(cd || { city: d.name, province: '', schools: [], lv_counts: {}, count: 0 }, d.planSchools);
    }
  });
}

// ── 侧边面板 ──────────────────────────────────────────────
function showPanel(cityData, extraPlanSchools) {
  document.getElementById('phCity').textContent = cityData.city;
  document.getElementById('phProv').textContent = cityData.province || '';

  // 统计行
  const lc = cityData.lv_counts || {};
  const statsEl = document.getElementById('phStats');
  let statsHtml = `<div class="ps-item"><div class="ps-num" style="color:#007AFF">${cityData.count}</div><div class="ps-lbl">院校总数</div></div>`;
  for (let lv = 1; lv <= 3; lv++) {
    const cnt = parseInt(lc[String(lv)] || 0);
    if (cnt) statsHtml += `<div class="ps-item"><div class="ps-num" style="color:${LV_COLOR[lv]}">${cnt}</div><div class="ps-lbl">${LV_NAME[lv]}</div></div>`;
  }
  statsEl.innerHTML = statsHtml;

  // 当前方案在该城市的学校映射
  const planMap = {};
  const planSchools = extraPlanSchools || (mapData.plan_cities && mapData.plan_cities[cityData.city]) || [];
  for (const s of planSchools) planMap[s.school] = s.tp;

  // 按层次分组
  const byLv = {};
  for (const s of (cityData.schools || [])) {
    if (!byLv[s.lv]) byLv[s.lv] = [];
    byLv[s.lv].push(s);
  }

  let html = '';
  for (let lv = 1; lv <= 6; lv++) {
    const schools = byLv[lv];
    if (!schools || !schools.length) continue;
    html += `<div class="lv-sec">
      <div class="lv-hd">
        <div class="lv-dot" style="background:${LV_COLOR[lv]}"></div>
        <div class="lv-name" style="color:${LV_COLOR[lv]}">${LV_NAME[lv]}</div>
        <div class="lv-cnt">${schools.length} 所</div>
      </div>
      ${schools.map(s => {
        const tp = planMap[s.name];
        const tpTag = tp ? `<span class="tp-tag ${TP_CLS[tp]||''}">${tp}</span>` : '';
        const scoreHtml = s.score ? `<div class="sch-score">${s.score}</div>` : '';
        return `<div class="sch-item ${tp ? 'plan-hi' : ''}">
          <div class="sch-name">${s.name}</div>
          ${tpTag}${scoreHtml}
        </div>`;
      }).join('')}
    </div>`;
  }

  if (!html) html = '<div class="no-data">暂无院校数据</div>';

  document.getElementById('panelBody').innerHTML = html;
  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
}

init();
</script>
